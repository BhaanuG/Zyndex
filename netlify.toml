[build]
  command = "npm run build"
  functions = "netlify/functions"
  publish = "dist"

[build.environment]
  NODE_ENV = "production"
  NPM_FLAGS = "--include=dev"

[dev]
  functions = "netlify/functions"
  command = "npm run dev"

[[redirects]]
  from = "/api/test"
  to = "/.netlify/functions/api-test"
  status = 200
  force = true
